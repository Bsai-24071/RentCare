<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCare — Login</title>
  <meta name="description"
    content="Login to your RentCare account. Manage properties, complaints, and rent payments all in one place.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🏠</div>
        <span class="auth-logo-text">RentCare</span>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue</p>
      <div id="error-msg" class="error-msg"></div>
      <input id="email" type="email" placeholder="Email address" autocomplete="email">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">
      <button id="login-btn" onclick="loginUser()">Sign In</button>
      <p class="switch-link">No account? <a href="register.html">Create one here</a></p>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
