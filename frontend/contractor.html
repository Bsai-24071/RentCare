<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCare - Contractor Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard">
    <div class="sidebar">
      <h2>RentCare</h2>
      <nav>
        <a href="#" onclick="showSection('jobs', event)" class="active">My Assigned Jobs</a>
        <a href="#" onclick="showSection('reviews', event)">My Reviews</a>
      </nav>
    </div>

    <div class="main-content">
      <div class="topbar">
        <div>
          <div class="page-title" id="welcome-name">Welcome, Contractor</div>
          <div class="page-sub">Manage your assigned jobs</div>
        </div>
        <div style="display:flex; align-items:center; gap:20px;">
          <div class="notif-bell">
            🔔
            <span class="notif-count" id="notif-count" style="display:none;">0</span>
          </div>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>

      <div id="section-jobs" class="card">
        <h3>Assigned Jobs</h3>
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Deadline</th>
              <th>Status</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="jobs-tbody">
            <tr><td colspan="5">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="section-reviews" class="card" style="display:none;">
        <h3>Reviews About You</h3>
        <div id="reviews-list" style="margin-bottom:20px;">
          <p style="color:#888;">Loading reviews...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (!user || user.role !== 'contractor') logout();

    document.getElementById('welcome-name').textContent = 'Welcome, ' + user.name;
    initSocket(user.id);

    function showSection(name, e) {
      document.getElementById('section-jobs').style.display = name === 'jobs' ? 'block' : 'none';
      document.getElementById('section-reviews').style.display = name === 'reviews' ? 'block' : 'none';
      if (name === 'reviews') loadMyReviews();
      document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
      if (e && e.target) e.target.classList.add('active');
    }

    async function loadJobs() {
      try {
        const complaints = await loadComplaints();
        const myJobs = complaints.filter(c =>
          c.contractorId &&
          (c.contractorId._id === user.id || c.contractorId === user.id)
        );
        const tbody = document.getElementById('jobs-tbody');
        if (!myJobs.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="color:#888">No jobs assigned</td></tr>';
          return;
        }
        tbody.innerHTML = myJobs.map(c => {
          let deadlineDisplay = 'Not set';
          if (c.deadline) {
            const d = new Date(c.deadline);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diff = Math.ceil((d - today) / (1000*60*60*24));
            const formatted = d.toLocaleDateString();
            if (diff < 0) deadlineDisplay = '<span style="color:#c62828;font-weight:600;">' + formatted + ' (Overdue)</span>';
            else if (diff <= 2) deadlineDisplay = '<span style="color:#e65100;font-weight:600;">' + formatted + ' (' + diff + 'd left)</span>';
            else deadlineDisplay = formatted;
          }
          const resolvedAt = c.status === 'resolved' && c.resolvedAt
            ? '<br><span style="font-size:11px;color:#085041;">✅ ' + new Date(c.resolvedAt).toLocaleString() + '</span>'
            : '';
          const updateCell = c.status === 'resolved'
            ? '<td><span style="font-size:12px;color:#085041;font-weight:500;">Completed ✓</span>' + resolvedAt + '</td>'
            : '<td><select onchange="updateJob(\'' + c._id + '\', this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid #ddd;font-size:12px">' +
              '<option value="">Change Status</option>' +
              '<option value="assigned"' + (c.status === 'assigned' ? ' selected' : '') + '>assigned</option>' +
              '<option value="in-progress"' + (c.status === 'in-progress' ? ' selected' : '') + '>in-progress</option>' +
              '<option value="resolved"' + (c.status === 'resolved' ? ' selected' : '') + '>resolved</option>' +
              '</select></td>';
          return '<tr><td>' + c.title + '</td><td>' + c.category + '</td><td>' + deadlineDisplay + '</td><td>' + statusBadge(c.status) + '</td>' + updateCell + '</tr>';
        }).join('');
      } catch (error) {
        document.getElementById('jobs-tbody').innerHTML = '<tr><td colspan="5" style="color:red;">Error: ' + (error.message || 'Failed to load. Is server running?') + '</td></tr>';
      }
    }

    async function updateJob(id, status) {
      if (!status) return;
      try {
        await apiPut('/api/complaints/update-status/' + id, { status });
        showToast('Job updated to: ' + status);
        setTimeout(() => loadJobs(), 500);
      } catch (error) {
        showToast('Failed to update job');
      }
    }

    async function loadMyReviews() {
      try {
        const data = await apiGet('/api/reviews/contractor/' + user.id);
        const reviews = data.reviews || [];
        const reviewsList = document.getElementById('reviews-list');

        // Remove any old avg div
        const oldAvg = document.getElementById('avg-rating-div');
        if (oldAvg) oldAvg.remove();

        if (!reviews.length) {
          reviewsList.innerHTML = '<p style="color:#888;">No reviews yet</p>';
          return;
        }

        const avgRating = data.averageRating || 0;
        reviewsList.innerHTML = reviews.map(r => {
          const tenantName = (typeof r.tenantId === 'object') ? (r.tenantId ? r.tenantId.name : 'Anonymous') : 'Anonymous';
          return '<div style="background:#f5f5f5;padding:12px;border-radius:8px;margin-bottom:10px;">' +
            '<div style="font-weight:600;">' + tenantName + '</div>' +
            '<div style="color:#666;font-size:12px;margin:5px 0;">' + '⭐'.repeat(r.rating) + ' (' + r.rating + '/5)</div>' +
            '<div style="font-size:13px;">' + (r.comment || 'No comment provided') + '</div></div>';
        }).join('');

        const avgDiv = document.createElement('div');
        avgDiv.id = 'avg-rating-div';
        avgDiv.style.cssText = 'margin-top:15px;padding:12px;background:#e3f2fd;border-radius:8px;';
        avgDiv.innerHTML = '<div style="font-size:14px;color:#1565c0;">📊 Average Rating: <strong style="font-size:16px;">' + avgRating + '/5 (' + reviews.length + ' reviews)</strong></div>';
        reviewsList.parentElement.appendChild(avgDiv);
      } catch (error) {
        document.getElementById('reviews-list').innerHTML = '<p style="color:red;">Error loading reviews</p>';
      }
    }

    loadJobs();
    loadMyReviews();
  </script>
</body>
</html>
