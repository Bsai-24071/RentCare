<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCare — Register</title>
  <meta name="description" content="Create your RentCare account as a tenant, landlord, or contractor.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🏠</div>
        <span class="auth-logo-text">RentCare</span>
      </div>
      <h1>Create account</h1>
      <p class="subtitle">Join RentCare to manage your rental experience</p>
      <div id="error-msg" class="error-msg"></div>
      <input id="name" type="text" placeholder="Full name" autocomplete="name">
      <input id="email" type="email" placeholder="Email address" autocomplete="email">
      <input id="password" type="password" placeholder="Password" autocomplete="new-password">
      <select id="role">
        <option value="" disabled selected>Select your role</option>
        <option value="tenant">Tenant</option>
        <option value="landlord">Landlord</option>
        <option value="contractor">Contractor</option>
      </select>
      <button id="register-btn" onclick="registerUser()">Create Account</button>
      <p class="switch-link">Already have an account? <a href="index.html">Sign in</a></p>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
